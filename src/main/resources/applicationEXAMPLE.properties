# ============================
# iLink 微信接入层
# ============================
ilink.enabled=true
ilink.auto-login=true
ilink.login-timeout-ms=180000
ilink.heartbeat-interval-ms=5000
ilink.heartbeat-enabled=true
ilink.connect-timeout-ms=35000
ilink.read-timeout-ms=35000
ilink.write-timeout-ms=35000
ilink.http-max-retries=3

# ============================
# Agent AI 层
# ============================
agent.ai.enabled=true
agent.ai.api-key=your-api-key-here
agent.ai.api-url=https://your-api-url/v1/chat/completions
agent.ai.model=your-model
agent.ai.temperature=0.7
agent.ai.max-tokens=2000
agent.ai.system-prompt=你是用户的微信私人AI助手，运行在微信环境中。你的职责是帮助用户解答问题、处理信息、生成内容，以及协调各项AI能力（对话、图片识别、文生图、语音合成等）。请用自然友好的方式与用户交流，优先使用中文回复。
agent.ai.connect-timeout-ms=30000
agent.ai.read-timeout-ms=180000

# ---- 记忆 ----
agent.ai.max-history-rounds=10
agent.ai.memory-ttl-minutes=30

# ---- 编排大模型（主模型，负责需求理解、任务分解、子模型调度、结果校验） ----
# 不配置则复用上方的 agent.ai.api-url / api-key / model
agent.ai.intent-model=your-intent-model
agent.ai.intent-api-url=https://your-intent-api-url/v1/chat/completions
agent.ai.intent-api-key=your-intent-api-key-here

# ---- 编排参数 ----
agent.orchestrator.max-loops=5
agent.orchestrator.clarification-enabled=true
agent.orchestrator.reflection-enabled=true

# ---- 文生图 ----
agent.ai.image-gen-enabled=true
agent.ai.image-gen-api-url=https://your-image-gen-api-url
agent.ai.image-gen-api-key=your-image-gen-api-key-here
agent.ai.image-gen-model=your-image-gen-model
agent.ai.image-gen-size=1024*1024
agent.ai.image-gen-n=1

# ---- 语音识别 & 语音生成 ----
agent.speech.enabled=true
agent.speech.api-key=your-speech-api-key-here
agent.speech.api-url=https://your-speech-api-url/v1
agent.speech.stt.enabled=true
agent.speech.stt.api-url=https://your-stt-api-url/v1/chat/completions
agent.speech.stt.model=your-stt-model
agent.speech.stt.ffmpeg-path=/path/to/ffmpeg
agent.speech.tts.enabled=true
agent.speech.tts.model=your-tts-model
agent.speech.tts.voice=your-tts-voice
agent.speech.tts.format=wav
agent.speech.tts.sample-rate=24000
