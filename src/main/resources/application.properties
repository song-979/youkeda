# ============================
# iLink 微信接入层
# ============================
ilink.enabled=true
ilink.auto-login=true
ilink.login-timeout-ms=180000
ilink.heartbeat-interval-ms=5000
ilink.heartbeat-enabled=true
ilink.connect-timeout-ms=35000
ilink.read-timeout-ms=35000
ilink.write-timeout-ms=35000
ilink.http-max-retries=3

# ============================
# Agent AI 层
# ============================
agent.ai.enabled=true
agent.ai.api-key=sk-ws-H.EHLYHLY.kGQB.MEUCIQCJjeP4lhvjuajBuuFOAxtsjNIrsdtKzWVzvYy7dsPaQQIgVPPjtN7dKMGAfERTY18jtXJ6ZFMKMuX8vzJGKty2eQA
agent.ai.api-url=https://ws-p3ywpv4dbftkiehk.cn-beijing.maas.aliyuncs.com/compatible-mode/v1/chat/completions
agent.ai.model=qwen3-vl-plus
agent.ai.temperature=0.7
agent.ai.max-tokens=2000
agent.ai.system-prompt=你是一个乐于助人的助手。
agent.ai.connect-timeout-ms=30000
agent.ai.read-timeout-ms=180000

# ---- Spring AI Tool Calling 内循环模型 ----
spring.ai.model.chat=openai
spring.ai.openai.api-key=${agent.ai.api-key}
spring.ai.openai.base-url=https://ws-p3ywpv4dbftkiehk.cn-beijing.maas.aliyuncs.com/compatible-mode
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=${agent.ai.model}
spring.ai.openai.chat.options.temperature=${agent.ai.temperature}
spring.ai.openai.chat.options.max-tokens=${agent.ai.max-tokens}

# ---- Tools 扩展层 ----
agent.tools.enabled=true
agent.tools.system.enabled=true

# ---- 美团跑腿 Skill 配置 ----
# Passport 用户授权。Token 由 pt-passport 管理，不写入配置文件。
meituan.passport.client-id=ac76c22d257c4c6d9164719eea64ed4b
meituan.passport.env=prod
meituan.passport.command=C:/Users/\u8c2d\u8317\u9a8f/AppData/Roaming/npm/pt-passport
meituan.passport.cache-dir=C:/Users/\u8c2d\u8317\u9a8f/AppData/Local/youkeda/meituan-passport
# 官方 Skill zip 包路径；运行时会自动解包并调用其中的 paotui.js。
meituan.paotui.zip-path=C:/Users/\u8c2d\u8317\u9a8f/Downloads/meituan-paotui.zip
# D 盘可交付脚本；存在时优先使用，组长可直接测试 tools/meituan-paotui 目录。
meituan.paotui.script-path=D:/youkeda/tools/meituan-paotui/paotui.js
meituan.paotui.node-command=C:/Program Files/nodejs/node.exe
meituan.paotui.source-from=aihub
meituan.paotui.timeout-seconds=45

# ---- 记忆 ----
agent.ai.max-history-rounds=10
agent.ai.memory-ttl-minutes=30

# ---- 编排大模型 ----
agent.ai.intent-model=qwen-plus
agent.ai.intent-api-url=https://ws-p3ywpv4dbftkiehk.cn-beijing.maas.aliyuncs.com/compatible-mode/v1/chat/completions
agent.ai.intent-api-key=sk-ws-H.EHLYHLY.kGQB.MEUCIQCJjeP4lhvjuajBuuFOAxtsjNIrsdtKzWVzvYy7dsPaQQIgVPPjtN7dKMGAfERTY18jtXJ6ZFMKMuX8vzJGKty2eQA

# ---- 编排参数 ----
agent.orchestrator.max-loops=5
agent.orchestrator.clarification-enabled=true
agent.orchestrator.reflection-enabled=true

# ---- 文生图 ----
