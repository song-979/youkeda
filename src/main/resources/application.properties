# ============================
# iLink 微信接入层
# ============================
ilink.enabled=true
ilink.auto-login=true
ilink.login-timeout-ms=180000
ilink.heartbeat-interval-ms=5000
ilink.heartbeat-enabled=true
ilink.connect-timeout-ms=35000
ilink.read-timeout-ms=35000
ilink.write-timeout-ms=35000
ilink.http-max-retries=3

# ============================
# Agent AI 层
# ============================
agent.ai.enabled=true
agent.ai.api-key=sk-ws-H.EDYLLEH.KTVZ.MEQCIDdrXhEgM8r4BzzOXN5X2sNykpR9bztXKyAQMuaWuDbyAiAvB68QdfZJkgBB7KxOsQIXP0lH_Rij8jrui9hApoxuOQ
agent.ai.api-url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
agent.ai.model=qwen3-vl-plus
agent.ai.temperature=0.7
agent.ai.max-tokens=2000
agent.ai.system-prompt=你是用户的微信私人AI助手，运行在微信环境中。你的职责是帮助用户解答问题、处理信息、生成内容，以及协调各项AI能力（对话、图片识别、文生图、语音合成等）。请用自然友好的方式与用户交流，优先使用中文回复。\\n\\n当用户要求生成文件（如 Markdown 文档、报告、总结、CSV、JSON 等）时，你必须在输出中使用以下格式包裹文件内容：\\n[FILE:文件名.ext]\\n文件内容...\\n[/FILE]\\n[/FILE] 之后可以附加简短的文字说明（如\"文件已生成\"）。支持的文件扩展名：txt、md、json、csv、html、xml、log、docx。\\n\\n当用户询问需要实时信息、最新数据或近期事件的问题时，你可以调用 web_search 工具搜索互联网获取最新信息，然后基于搜索结果给出综合回答。你可以在查询词中使用 site:域名 限定搜索特定网站，使用 filetype:类型 过滤特定文件格式。\\n\\n当用户分享网页链接、询问某网页内容摘要、或需要获取网页中图片时，可以调用 get_webpage_metadata 获取网页元数据（标题、描述、关键词等），调用 extract_webpage_images 提取网页中的所有图片链接。\\n\\n当用户想要制作摸摸头GIF表情包时，可以调用 generate_motou_gif_from_url（传入图片URL）或 generate_motou_gif_from_image（无需提供图片数据，工具会自动使用已发送的图片）生成可爱的摸摸头动图。
agent.ai.connect-timeout-ms=30000
agent.ai.read-timeout-ms=180000

# ---- Spring AI Tool Calling 内循环模型 ----
# 外层仍由当前多 Agent 编排控制，CHAT Agent 内部后续可接 Spring AI ChatClient + tools。
spring.ai.model.chat=openai
spring.ai.openai.api-key=${agent.ai.api-key}
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=${agent.ai.model}
spring.ai.openai.chat.options.temperature=${agent.ai.temperature}
spring.ai.openai.chat.options.max-tokens=${agent.ai.max-tokens}

